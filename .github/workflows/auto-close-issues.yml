name: Auto Close Issues on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close linked issues
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';
            const combined = `${title}\n${body}`;
            
            // Match: Closes #123, Fixes #123, Resolves #123 (case insensitive)
            const regex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issues = new Set();
            let match;
            
            while ((match = regex.exec(combined)) !== null) {
              issues.add(parseInt(match[1]));
            }
            
            if (issues.size === 0) {
              console.log('No linked issues found in PR');
              return;
            }
            
            for (const issueNumber of issues) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
                console.log(`✅ Closed issue #${issueNumber}`);
              } catch (error) {
                console.log(`⚠️ Failed to close issue #${issueNumber}: ${error.message}`);
              }
            }
