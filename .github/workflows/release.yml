name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── 1. Build + test gate ───────────────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: node --test test/*.test.mjs

  # ── 2. GitHub Release → triggers publish.yml (npm) ────────────────────────
  github-release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --generate-notes --title "$TAG"

  # ── 3. Publish to ClawHub ──────────────────────────────────────────────────
  clawhub-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx clawhub@latest auth login --token "$CLAWHUB_TOKEN" --no-browser
          npx clawhub@latest publish "$(pwd)/skills/declaw" --version "$VERSION"

  # ── 4. Backmerge main → develop ────────────────────────────────────────────
  backmerge:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout develop
          git merge main --no-edit
          git push origin develop
